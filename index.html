<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Healthcare Field Locator & Navigation Suite</title>
    <style>
        /* Base Reset & Layout Split Dashboard */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        /* Main Header Banner Styles */
        .top-banner {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            position: relative; /* Context for nested absolute positioning */
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .banner-title-container {
            display: inline-block;
            max-width: 60%;
        }

        #suite-title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: block;
        }

        .banner-subtitle {
            font-size: 13px;
            font-weight: normal;
            color: #bdc3c7;
            margin-top: 5px;
            display: block;
            letter-spacing: 1px;
        }

        /* Relocated Application Switcher Container */
        .app-switcher-bar {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 12px;
        }

        .switch-btn {
            background: rgba(52, 73, 94, 0.6);
            color: #bdc3c7;
            border: 1px solid rgba(69, 90, 100, 0.7);
            padding: 8px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .switch-btn:hover {
            background: rgba(65, 91, 118, 0.8);
            color: #fff;
        }

        .switch-btn.active-mode {
            background: #3498db;
            color: #ffffff;
            border-color: #2980b9;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
        }

        /* Main Workspace Container Frame - Strict 70% / 30% Split */
        .container {
            display: flex;
            width: 100vw;
            flex: 1;
            overflow: hidden;
        }

        /* Form Container - Explicitly 70% of Screen Width */
        .form-container {
            position: relative;
            flex: 0 0 70vw; 
            width: 70vw;
            height: 100%;
            overflow: auto;
            background-color: #eef2f5;
            padding: 15px;
            box-sizing: border-box;
            border-right: 2px solid #cfd8dc;
        }

        /* Image Fluid Responsiveness Configuration */
        #form-image {
            display: block;
            width: 100%;  
            height: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
	    margin-top: 0.5mm; /* <-- ADD THIS LINE to shift the image 2mm up */
        }

        /* Right Side Quiz Interface Panel - Explicitly 30% Width */
        .dashboard-panel {
            flex: 0 0 30vw;
            width: 30vw;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-content { padding: 25px; }

        /* Screen Routing Engine */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Typography & Components */
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px; 
            border-bottom: 2px solid #eceff1;
            padding-bottom: 12px;
        }

        h3 { font-size: 20px !important; }

        .card {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card p { font-size: 16px; }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 16px; 
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px; 
            box-sizing: border-box;
        }

        .btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px; 
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background: #27ae60; }
        .btn-retry { background: #3498db; }
        .btn-retry:hover { background: #2980b9; }

        #box-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        #box-list li {
            background: #e8f4fd;
            border: 2px solid #3498db;
            color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            font-size: 22px; 
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.1);
        }

        /* Countdown Progress Bar Component */
        .timer-container {
            width: 100%;
            background: #e2e8f0;
            height: 12px; 
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background: #2ecc71;
            transition: width 0.1s linear, background-color 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-box {
            background: #edf2f7;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px; 
            font-weight: bold;
        }
        .stat-box span {
            display: block;
            font-size: 24px; 
            color: #2b6cb0;
            margin-top: 6px;
        }

        .bordered-list {
            padding: 0;
            list-style: none;
        }
        .bordered-list li {
            border: 1px solid #cbd5e0;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            background: #fff;
            font-size: 16px; 
        }

        area { outline: none; }
        .fade-in { animation: fadeInEffect 0.4s ease-out; }
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        </div>

                    <div class="timer-container">

                <div id="results-screen" class="screen fade-in">
                    <h2>📊 Performance Summary</h2>
                    <div id="results-content"></div>
                </div>

            </div>
        </div>
    </div>

                    { alt: "76. Attending Last Name", coords: "1959,3595,2628,3660" },
                    { alt: "76. Attending First Name", coords: "2630,3596,3159,3661" },
                    { alt: "77.Operating NPI", coords: "2216,3661,2663,3723" },
                    { alt: "77.Operating Qualifier", coords: "2742,3659,2820,3724" },
                    { alt: "77.Operating Last Name", coords: "1957,3724,2629,3783" },
                    { alt: "77. Operating First Name", coords: "2629,3723,3158,3785" },
                    { alt: "77. Operating ID", coords: "2817,3659,3158,3720" },
                    { alt: "78.Other NPI", coords: "2214,3788,2663,3851" },
                    { alt: "78.Other Qualifier", coords: "2741,3788,2820,3852" },
                    { alt: "78.Other ID", coords: "2820,3787,3159,3850" },
                    { alt: "78.Other Last Name", coords: "1956,3848,2629,3912" },
                    { alt: "78. Other First Name", coords: "2629,3850,3159,3912" },
                    { alt: "79.Other NPI", coords: "2217,3912,2662,3975" },
                    { alt: "79.Other Qualifier", coords: "2738,3914,2817,3976" },
                    { alt: "79. Other ID", coords: "2818,3912,3159,3974" },
                    { alt: "79. Other Last Name", coords: "1958,3973,2629,4037" },
                    { alt: "79. Other First Name", coords: "2626,3973,3160,4035" },
                    { alt: "80. Remarks", coords: "54,3784,967,4036" },
                    { alt: "81A. Qualifier", coords: "1044,3785,1116,3848" },
                    { alt: "81A. Taxonomy Code 1", coords: "1114,3786,1497,3849" },
                    { alt: "81A. Taxonomy Code 2", coords: "1496,3784,1948,3848" },
                    { alt: "81B. Qualifier", coords: "1042,3847,1114,3911" },
                    { alt: "81B. Taxonomy Code 1", coords: "1116,3847,1496,3911" },
                    { alt: "82B. Taxonomy Code 2", coords: "1497,3851,1950,3912" },
                    { alt: "81C. Qualifier", coords: "1042,3913,1113,3976" },
                    { alt: "81C. Taxonomy Code 1", coords: "1116,3909,1495,3975" },
                    { alt: "81C. Taxonomy Code 2", coords: "1496,3912,1947,3974" },
                    { alt: "81D. Qualifier", coords: "1045,3976,1113,4037" },
                    { alt: "81D. Taxonomy Code 1", coords: "1114,3976,1495,4037" },
                    { alt: "81D. Taxonomy Code 2", coords: "1495,3976,1950,4035" }
                ]
            }
        };

        // --- Core Context Tracking States ---
        let activeMode = 'hcfa'; 
        let boxNames = [];
        let maxAttempts = 10;
        let timePerQuestion = 15;
        let quizPool = [];
        let currentBoxName = '';
        let score = 0;
        let attempts = 0;
        let currentStreak = 0;
        let startTime = 0;
        let questionTimerInterval = null;
        let timeRemaining = 0;

        const wrongClicks = [];
        const correctClicks = [];
        let redBox = null;

        // UI Element References
        const formImage = document.getElementById('form-image');
        const dynamicImageMap = document.getElementById('dynamic-image-map');
        const suiteTitle = document.getElementById('suite-title');
        
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultsScreen = document.getElementById('results-screen');
        const boxList = document.getElementById('box-list');
        
        const scoreElement = document.getElementById('score');
        const attemptsElement = document.getElementById('attempts');
        const streakElement = document.getElementById('streak');
        const timeText = document.getElementById('time-text');
        const timerBar = document.getElementById('timer-bar');
        const resultsContent = document.getElementById('results-content');
        const inputQuestions = document.getElementById('input-questions');

        // --- Sound Module Context ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                if (type === 'correct') {
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(783.99, audioCtx.currentTime + 0.08); 
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                } else {
                    osc.frequency.setValueAtTime(220.00, audioCtx.currentTime); 
                    osc.frequency.linearRampToValueAtTime(130.81, audioCtx.currentTime + 0.18); 
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.22);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.22);
                }
            } catch(e) {}
        }

        // --- DYNAMIC IMAGE MAP RESPONSIVE ENGINE ---
        function resizeImageMapCoords() {
            const profile = mapDataProfiles[activeMode];
            const renderedWidth = formImage.clientWidth;
            if (!renderedWidth) return; 

            const scaleFactor = renderedWidth / profile.nativeWidth;
            const areas = dynamicImageMap.getElementsByTagName('area');

            profile.areas.forEach((profileArea, index) => {
                if (areas[index]) {
                    const originalCoords = profileArea.coords.split(',').map(Number);
                    const resizedCoords = originalCoords.map(coord => Math.round(coord * scaleFactor));
                    areas[index].coords = resizedCoords.join(',');
                }
            });
        }

        function applyAppMode(modeKey) {
            activeMode = modeKey;
            const profile = mapDataProfiles[modeKey];

            suiteTitle.textContent = profile.title;
            formImage.src = profile.imageSrc;

            inputQuestions.max = profile.maxFields;
            if (parseInt(inputQuestions.value) > profile.maxFields) {
                inputQuestions.value = profile.maxFields;
            }

            dynamicImageMap.innerHTML = '';
            boxNames = [];

            profile.areas.forEach(area => {
                const cleanedBoxName = area.alt.replace(/&amp;/g, '&');
                boxNames.push(cleanedBoxName);

                const areaEl = document.createElement('area');
                areaEl.shape = 'rect';
                areaEl.alt = cleanedBoxName;
                areaEl.title = cleanedBoxName;
                areaEl.href = '#';
                areaEl.setAttribute('data-box', cleanedBoxName);

                areaEl.addEventListener('click', function (e) {
                    e.preventDefault();
                    if (gameScreen.classList.contains('active')) {
                        checkBoxSelection(this.getAttribute('data-box'), e);
                    }
                });
                areaEl.addEventListener('mouseover', function () {
                    if (gameScreen.classList.contains('active')) {
                        createRedBoxFromResized(this.coords);
                    }
                });
                areaEl.addEventListener('mouseout', removeRedBox);

                dynamicImageMap.appendChild(areaEl);
            });

            if (formImage.complete) {
                resizeImageMapCoords();
            } else {
                formImage.onload = function() {
                    resizeImageMapCoords();
                    formImage.onload = null;
                };
            }

            resetSimulationState();
        }

        function resetSimulationState() {
            clearInterval(questionTimerInterval);
            setupScreen.classList.add('active');
            gameScreen.classList.remove('active');
            resultsScreen.classList.remove('active');
            score = 0; attempts = 0; currentStreak = 0;
            wrongClicks.length = 0; correctClicks.length = 0;
            removeRedBox();
        }

        // --- Interaction Feedback Engine ---
        function spawnFeedback(e, isCorrect) {
            const feedback = document.createElement('div');
            feedback.innerText = isCorrect ? '👍' : '👎';
            feedback.style.position = 'absolute';
            feedback.style.left = `${e.pageX - 15}px`;
            feedback.style.top = `${e.pageY - 15}px`;
            feedback.style.fontSize = '45px'; 
            feedback.style.pointerEvents = 'none';
            feedback.style.zIndex = '2000';
            feedback.style.transition = 'all 0.6s ease-out';
            
            if (isCorrect) {
                feedback.style.filter = 'hue-rotate(90deg) brightness(0.6) drop-shadow(0px 0px 8px #1b5e20)';
            } else {
                feedback.style.filter = 'hue-rotate(300deg) brightness(0.6) drop-shadow(0px 0px 8px #b71c1c)';
            }
            
            document.body.appendChild(feedback);

            requestAnimationFrame(() => {
                feedback.style.transform = 'translateY(-50px) scale(1.3)';
                feedback.style.opacity = '0';
            });
            setTimeout(() => feedback.remove(), 600);
        }

        function createRedBoxFromResized(resizedCoordsStr) {
            removeRedBox(); 
            const coords = resizedCoordsStr.split(',').map(Number);
            
            redBox = document.createElement('div');
            redBox.style.position = 'absolute';
            
            const thickness = mapDataProfiles[activeMode].borderWidth;
            redBox.style.border = `${thickness} dashed #e74c3c`;
            redBox.style.backgroundColor = 'rgba(231, 76, 60, 0.18)';
            redBox.style.pointerEvents = 'none';
            
            redBox.style.left = `${coords[0] + 15}px`;   
            redBox.style.top = `${coords[1] + 15}px`;     
            redBox.style.width = `${coords[2] - coords[0]}px`;
            redBox.style.height = `${coords[3] - coords[1]}px`;
            
            document.querySelector('.form-container').appendChild(redBox);
        }

        function removeRedBox() {
            if (redBox) {
                redBox.remove();
                redBox = null;
            }
        }

        function highlightCorrectBox(fieldName) {
            const areaTarget = Array.from(dynamicImageMap.getElementsByTagName('area')).find(area => 
                area.getAttribute('data-box') === fieldName
            );
            
            if (areaTarget) {
                createRedBoxFromResized(areaTarget.coords);
                const [, top] = areaTarget.coords.split(',').map(Number);

                document.querySelector('.form-container').scrollTo({
                    top: top - 50,
                    behavior: 'smooth'
                });

                let flashCycle = 0;
                const flashTimer = setInterval(() => {
                    if (redBox) redBox.style.opacity = (redBox.style.opacity === '0' ? '1' : '0');
                    if (++flashCycle > 10) {
                        clearInterval(flashTimer);
                        if (redBox) redBox.style.opacity = '1';
                    }
                }, 150);
            }
        }

        // --- Game Setup Controls Engine ---
        document.getElementById('start-game-btn').addEventListener('click', function() {
            const qInput = parseInt(inputQuestions.value);
            const tInput = parseInt(document.getElementById('input-timer').value);

            maxAttempts = isNaN(qInput) ? 10 : Math.min(Math.max(qInput, 1), boxNames.length);
            timePerQuestion = isNaN(tInput) ? 15 : Math.min(Math.max(tInput, 3), 60);

            quizPool = [...boxNames].sort(() => Math.random() - 0.5).slice(0, maxAttempts);
            
            setupScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            startTime = Date.now();
            showNextQuestion();
        });

        function showNextQuestion() {
            clearInterval(questionTimerInterval);
            if (attempts >= maxAttempts) {
                displayResults();
                return;
            }

            currentBoxName = quizPool[attempts];
            boxList.innerHTML = `<li class="fade-in">${currentBoxName}</li>`;
            
            attemptsElement.textContent = maxAttempts - attempts;
            scoreElement.textContent = score;
            streakElement.textContent = currentStreak;

            initQuestionTimer();
        }

        function initQuestionTimer() {
            timeRemaining = timePerQuestion;
            timeText.textContent = `${timeRemaining}s`;
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#2ecc71';

            questionTimerInterval = setInterval(() => {
                timeRemaining--;
                timeText.textContent = `${timeRemaining}s`;
                
                let percentage = (timeRemaining / timePerQuestion) * 100;
                timerBar.style.width = `${percentage}%`;

                if (percentage < 30) {
                    timerBar.style.backgroundColor = '#e74c3c'; 
                } else if (percentage < 60) {
                    timerBar.style.backgroundColor = '#f1c40f'; 
                }

                if (timeRemaining <= 0) {
                    clearInterval(questionTimerInterval);
                    handleFailure(null, true); 
                }
            }, 1000);
        }

        function checkBoxSelection(name, clickEvent) {
            clearInterval(questionTimerInterval);
            const isCorrect = (name === currentBoxName);
            
            if (isCorrect) {
                playSound('correct');
                if(clickEvent) spawnFeedback(clickEvent, true);
                score++;
                currentStreak++;
                correctClicks.push({ name: currentBoxName });
            } else {
                handleFailure(clickEvent, false);
                return;
            }

            attempts++;
            showNextQuestion();
        }

        function handleFailure(clickEvent, isTimeout) {
            playSound('wrong');
            if (clickEvent && !isTimeout) spawnFeedback(clickEvent, false);
            
            currentStreak = 0;
            wrongClicks.push({ 
                correct: currentBoxName, 
                reason: isTimeout ? 'Timed out' : 'Incorrect Selection' 
            });

            attempts++;
            showNextQuestion();
        }

        function displayResults() {
            clearInterval(questionTimerInterval);
            gameScreen.classList.remove('active');
            resultsScreen.classList.add('active');

            const elapsedTotal = ((Date.now() - startTime) / 1000).toFixed(1);
            const finalPercentage = ((score / maxAttempts) * 100).toFixed(1);

            let wrongSummaryHtml = "<h3 style='color:#e74c3c; margin-top:25px;'>❌ Areas For Review:</h3><ul class='bordered-list'>";
            wrongClicks.forEach((item, index) => {
                wrongSummaryHtml += `
                    <li id="review-item-${index}" style="cursor:pointer; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#fdf2f2'" onmouseout="this.style.backgroundColor='#fff'">
                        🔍 <b>${item.correct}</b> <span style="color:#7f8c8d; font-size:14px;">(${item.reason} - Click to check location)</span>
                    </li>`;
            });
            wrongSummaryHtml += "</ul>";

            let correctSummaryHtml = "<h3 style='color:#2ecc71; margin-top:25px;'>✅ Mastered Fields:</h3><ul class='bordered-list'>";
            correctClicks.forEach((item) => {
                correctSummaryHtml += `<li>Item Located: <b>${item.name}</b></li>`;
            });
            correctSummaryHtml += "</ul>";

            resultsContent.innerHTML = `
                <div class="card" style="text-align:center;">
                    <p style="font-size: 24px; margin:0 0 15px 0;">🎉 Evaluation Complete!</p>
                    <p style="font-size: 38px; font-weight:bold; color:#2980b9; margin:15px 0;">${finalPercentage}%</p>
                    <p style="font-size: 16px;">Accurately checked <b>${score}</b> out of <b>${maxAttempts}</b> total target items.</p>
                    <p style="color:#7f8c8d; font-size: 14px;">Total operational time: ${elapsedTotal} seconds.</p>
                    <button id="reload-app-btn" class="btn btn-retry" style="margin-top:15px;">Configure New Session</button>
                </div>
                ${wrongClicks.length > 0 ? wrongSummaryHtml : "<p style='color:#2ecc71; font-weight:bold; font-size:20px; text-align:center;'>🎯 Perfect Score! Your accuracy profile is exemplary.</p>"}
                ${correctClicks.length > 0 ? correctSummaryHtml : ""}
            `;

            document.getElementById('reload-app-btn').addEventListener('click', () => {
                applyAppMode(activeMode);
            });

            wrongClicks.forEach((item, index) => {
                document.getElementById(`review-item-${index}`).addEventListener('click', function() {
                    highlightCorrectBox(item.correct);
                });
            });
        }

        // --- App Switcher Event Handlers ---
        const hcfaModeBtn = document.getElementById('mode-hcfa-btn');
        const ubModeBtn = document.getElementById('mode-ub-btn');

        hcfaModeBtn.addEventListener('click', () => {
            if (activeMode !== 'hcfa') {
                hcfaModeBtn.classList.add('active-mode');
                ubModeBtn.classList.remove('active-mode');
                applyAppMode('hcfa');
            }
        });

        ubModeBtn.addEventListener('click', () => {
            if (activeMode !== 'ub') {
                ubModeBtn.classList.add('active-mode');
                hcfaModeBtn.classList.remove('active-mode');
                applyAppMode('ub');
            }
        });

        // Initialize Defaults
        applyAppMode('hcfa');
        
        window.addEventListener('resize', () => {
            removeRedBox();
            resizeImageMapCoords();
        });
    });
    </script>
